# PostgreSQL Configuration for FridgeOS Time-Series Data
# Optimized for moderate workload with frequent inserts and time-range queries

# Memory Settings
shared_buffers = 512MB                    # Conservative for 4GB RAM host
effective_cache_size = 2GB                # OS cache + shared_buffers estimate (SSD)
work_mem = 4MB                            # Per-operation; keep small for low-RAM devices
temp_buffers = 8MB                        # Per-session temp buffer space
maintenance_work_mem = 256MB              # Helps VACUUM/CREATE INDEX; don't overdo on 4GB

# Checkpoint Settings
checkpoint_completion_target = 0.9        # Spread checkpoints over 90% of interval
wal_buffers = -1                          # Auto-tune (usually best)
checkpoint_timeout = 10min                # Checkpoint frequency
max_wal_size = 1GB
min_wal_size = 256MB
wal_compression = on

# Query Planner Settings
default_statistics_target = 100           # Statistics sampling for query planning
random_page_cost = 1.1                    # Assumes SSD storage
effective_io_concurrency = 100            # SSD-friendly, but conservative for low-end CPU

# Connection Settings
max_connections = 100                      # Reasonable for small setup

# Parallelism (safe even on 2-core devices; Postgres won't use more than available)
max_parallel_workers = 4
max_parallel_workers_per_gather = 1

# Time-Series Specific Optimizations
# These are especially good for TimescaleDB
synchronous_commit = off                   # Better performance for bulk inserts
wal_level = replica                        # Needed for TimescaleDB features
max_wal_senders = 1                        # For potential replication

# Logging (optional - helpful for debugging)
log_min_duration_statement = 1000          # Log queries taking > 1 second
log_checkpoints = on
log_connections = on
log_disconnections = on 